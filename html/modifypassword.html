<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>비밀번호 수정</title>
  <link rel="stylesheet" href="../css/modifypassword.css" />
</head>
<body>
  <div class="modify-container">
    <h2>비밀번호 변경</h2>
    <div class="form-group">
      <label for="password">현재 비밀번호</label>
      <input type="password" id="password" placeholder="현재 비밀번호" />
    </div>
    <div class="form-group">
      <label for="new_password">새 비밀번호</label>
      <input type="password" id="new_password" placeholder="새 비밀번호" />
    </div>
    <div class="form-group">
      <label for="confirm_password">새 비밀번호 확인</label>
      <input type="password" id="confirm_password" placeholder="새 비밀번호 확인" />
    </div>
    <div class="button-group">
      <button id="modifyBtn" type="button">변경하기</button>
      <button id="modifyDoneBtn" type="button" disabled style="display: none;">변경 완료</button>
    </div>
  </div>

  <script src="../js/modifypassword.js" type="module"></script>
</body>
</html>
